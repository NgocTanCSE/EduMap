# Continuous Integration for EduMap HF Space
# -------------------------------------------------
# This workflow builds the Docker image and pushes it to the Hugging Face Space.
# It runs on every push to the main branch (or any branch) and on pull‑request events.
# The HF token (HF_SPACE_TOKEN) must be added as a secret in the repository settings.

name: CI / Deploy to Hugging Face

on:
  push:
    branches: [ main, master, "*" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi‑arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (optional – can be omitted if using HF only)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Hugging Face Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.HF_SPACE_USER }}
          password: ${{ secrets.HF_SPACE_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/edumap:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/edumap:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/edumap:buildcache,mode=max

      - name: Trigger Hugging Face Space rebuild
        env:
          HF_API_TOKEN: ${{ secrets.HF_SPACE_TOKEN }}
        run: |
          curl -X POST -H "Authorization: Bearer $HF_API_TOKEN" \
            https://huggingface.co/api/spaces/${{ github.repository_owner }}/edumap/restart
