name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          
          git remote add hf https://tancse2005:${HF_TOKEN}@huggingface.co/spaces/tancse2005/Edumap
          # Đảm bảo git lfs hook được cấu hình
          git lfs install
          # Explicitly push LFS objects to the HF remote
          git lfs push hf HEAD
          # Push code
          git push --force hf HEAD:main
