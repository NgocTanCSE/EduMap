name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Đổi tên Dockerfile.hf thành Dockerfile vì Hugging Face yêu cầu tên chính xác là "Dockerfile"
          if [ -f "Dockerfile.hf" ]; then
            cp Dockerfile.hf Dockerfile
            git config --global user.email "actions@github.com"
            git config --global user.name "GitHub Actions"
            git add Dockerfile
            git commit -m "Rename Dockerfile.hf to Dockerfile for HF Spaces" || true
          fi
          
          # Đẩy code lên Hugging Face (Thay username và tên Space của bạn vào đường dẫn dưới)
          # Ví dụ: https://tancse2005:${HF_TOKEN}@huggingface.co/spaces/tancse2005/Edumap
          git push --force https://tancse2005:${HF_TOKEN}@huggingface.co/spaces/tancse2005/Edumap HEAD:main
