apiVersion: apps/v1
kind: Deployment
metadata:
  name: edumap-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edumap-frontend
  template:
    metadata:
      labels:
        app: edumap-frontend
    spec:
      containers:
      - name: frontend
        image: edumap-frontend:latest
        ports:
        - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: edumap-frontend-service
spec:
  selector:
    app: edumap-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: LoadBalancer
