apiVersion: apps/v1
kind: Deployment
metadata:
  name: edumap-backend
  labels:
    app: edumap-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edumap-backend
  template:
    metadata:
      labels:
        app: edumap-backend
    spec:
      containers:
      - name: backend
        image: edumap-backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: edumap-config
---
apiVersion: v1
kind: Service
metadata:
  name: edumap-backend-service
spec:
  selector:
    app: edumap-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
